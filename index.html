<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سيرفر RTA الشاملة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0b0f19;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 sm:p-6 flex flex-col items-center justify-center">

    <div class="max-w-md w-full bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800 relative overflow-hidden my-6">
        <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-emerald-500 via-green-500 to-emerald-600"></div>
        
        <h1 class="text-2xl font-black text-center text-emerald-400 mb-2">إدارة سيرفر RTA ⚙️</h1>
        <p class="text-center text-xs text-slate-400 mb-6">التحكم الموحد في (أندرويد / آيفون / بي سي)</p>
        
        <div id="login-section" class="space-y-4">
            <div class="p-4 bg-slate-950/60 rounded-xl border border-slate-800">
                <label class="block text-xs text-slate-400 mb-2 font-bold">أدخل كلمة مرور اللوحة للدخول:</label>
                <input id="admin-password" type="password" placeholder="••••••••" class="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700 text-center focus:outline-none focus:border-emerald-500 text-white font-mono">
                <button onclick="checkPassword()" class="w-full mt-3 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl text-sm font-black transition-all">تحقق ودخول 🔑</button>
            </div>
        </div>

        <div id="control-section" class="hidden space-y-6">
            
            <div class="p-4 bg-slate-950/50 rounded-xl border border-slate-800 space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-black text-white text-sm">1. هاك Delta (Android)</h2>
                    <span id="delta-status-badge" class="text-[11px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400">جاري الفحص...</span>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 mb-1">رابط التحميل المباشر (APK):</label>
                    <textarea id="delta-url" rows="1" class="w-full bg-slate-900 p-2 rounded-lg text-xs text-emerald-300 border border-slate-700 focus:outline-none focus:border-emerald-500 font-mono text-left" dir="ltr"></textarea>
                </div>
                <div class="flex gap-2">
                    <button onclick="updateGist('delta', true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-xs font-black transition-all">تشغيل ✅</button>
                    <button onclick="updateGist('delta', false)" class="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-lg text-xs font-black transition-all">تعطيل ❌</button>
                </div>
            </div>

            <div class="p-4 bg-slate-950/50 rounded-xl border border-slate-800 space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-black text-white text-sm">2. هاك Arceus (Android)</h2>
                    <span id="arceus-status-badge" class="text-[11px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400">جاري الفحص...</span>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 mb-1">رابط التحميل المباشر (APK):</label>
                    <textarea id="arceus-url" rows="1" class="w-full bg-slate-900 p-2 rounded-lg text-xs text-emerald-300 border border-slate-700 focus:outline-none focus:border-emerald-500 font-mono text-left" dir="ltr"></textarea>
                </div>
                <div class="flex gap-2">
                    <button onclick="updateGist('arceus', true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-xs font-black transition-all">تشغيل ✅</button>
                    <button onclick="updateGist('arceus', false)" class="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-lg text-xs font-black transition-all">تعطيل ❌</button>
                </div>
            </div>

            <div class="p-4 bg-slate-950/50 rounded-xl border border-slate-800 space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-black text-white text-sm">3. نسخة الآيفون (iOS)</h2>
                    <span id="ios-status-badge" class="text-[11px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400">جاري الفحص...</span>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 mb-1">رابط ملف الـ Plist المباشر:</label>
                    <textarea id="ios-url" rows="1" class="w-full bg-slate-900 p-2 rounded-lg text-xs text-emerald-300 border border-slate-700 focus:outline-none focus:border-emerald-500 font-mono text-left" dir="ltr"></textarea>
                </div>
                <div class="flex gap-2">
                    <button onclick="updateGist('ios', true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-xs font-black transition-all">تشغيل ✅</button>
                    <button onclick="updateGist('ios', false)" class="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-lg text-xs font-black transition-all">تعطيل ❌</button>
                </div>
            </div>

            <div class="p-4 bg-slate-950/50 rounded-xl border border-slate-800 space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-black text-white text-sm">4. أداة الكمبيوتر (PC)</h2>
                    <span id="pc-status-badge" class="text-[11px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400">جاري الفحص...</span>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 mb-1">رابط تحميل أداة الـ PC:</label>
                    <textarea id="pc-url" rows="1" class="w-full bg-slate-900 p-2 rounded-lg text-xs text-emerald-300 border border-slate-700 focus:outline-none focus:border-emerald-500 font-mono text-left" dir="ltr"></textarea>
                </div>
                <div class="flex gap-2">
                    <button onclick="updateGist('pc', true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-xs font-black transition-all">تشغيل ✅</button>
                    <button onclick="updateGist('pc', false)" class="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-lg text-xs font-black transition-all">تعطيل ❌</button>
                </div>
            </div>

            <div id="status-msg" class="text-center text-xs text-yellow-400 font-bold hidden bg-yellow-950/30 py-2 rounded-lg border border-yellow-900/30 animate-pulse">جاري تحديث البيانات في قيت هوب...</div>
        </div>
    </div>

    <script>
        // ==================== [ إعداداتك السحابية ] ====================
        const GITHUB_TOKEN = "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"; 
        const GIST_ID = "bdcc249af49a22afee0dc64d32d8a577"; 
        const FILE_NAME = "rta_config.json"; 
        const ADMIN_PASSWORD = "67"; 
        // ============================================================

        const API_URL = `https://api.github.com/gists/${GIST_ID}`;

        function checkPassword() {
            const input = document.getElementById('admin-password').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('control-section').classList.remove('hidden');
                loadCurrentConfig();
            } else {
                alert("رمز الدخول غير صحيح! ❌");
            }
        }

        async function loadCurrentConfig() {
            try {
                let res = await fetch(API_URL + '?nocache=' + new Date().getTime());
                let gistData = await res.json();
                let config = JSON.parse(gistData.files[FILE_NAME].content);
                
                // تعبئة البيانات في الخانات الثلاث الجديدة والقديمة
                document.getElementById('delta-url').value = config.delta_link || '';
                document.getElementById('arceus-url').value = config.arceus_link || '';
                document.getElementById('ios-url').value = config.ios_link || '';
                document.getElementById('pc-url').value = config.pc_link || '';

                // تحديث جميع الشارات (Badges)
                updateAllBadges(config);
            } catch (e) { 
                alert("فشل في قراءة بيانات قيت هوب السحابية. تأكد من تهيئة الـ Gist بالبيانات الجديدة."); 
            }
        }

        function updateAllBadges(config) {
            setBadge('delta-status-badge', config.delta_status);
            setBadge('arceus-status-badge', config.arceus_status);
            setBadge('ios-status-badge', config.ios_status);
            setBadge('pc-status-badge', config.pc_status);
        }

        function setBadge(id, status) {
            const badge = document.getElementById(id);
            if(status) { 
                badge.className = "text-[11px] font-bold px-2 py-0.5 rounded bg-emerald-950 text-emerald-400 border border-emerald-900/40"; 
                badge.innerText = "شغال حالياً 🟢"; 
            } else { 
                badge.className = "text-[11px] font-bold px-2 py-0.5 rounded bg-red-950 text-red-400 border border-red-900/40"; 
                badge.innerText = "معطل حالياً 🔴"; 
            }
        }

        async function updateGist(platform, status) {
            const msg = document.getElementById('status-msg');
            msg.className = "text-center text-xs text-yellow-400 font-bold bg-yellow-950/30 py-2 rounded-lg border border-yellow-900/30 animate-pulse";
            msg.innerText = "جاري تحديث البيانات في قيت هوب...";
            msg.classList.remove('hidden');

            try {
                let res = await fetch(API_URL + '?nocache=' + new Date().getTime());
                let gistData = await res.json();
                let config = JSON.parse(gistData.files[FILE_NAME].content);

                // تعديل القيم بحسب المنصة المختارة بالتحديد
                if (platform === 'delta') {
                    config.delta_status = status;
                    config.delta_link = document.getElementById('delta-url').value;
                } else if (platform === 'arceus') {
                    config.arceus_status = status;
                    config.arceus_link = document.getElementById('arceus-url').value;
                } else if (platform === 'ios') {
                    config.ios_status = status;
                    config.ios_link = document.getElementById('ios-url').value;
                } else if (platform === 'pc') {
                    config.pc_status = status;
                    config.pc_link = document.getElementById('pc-url').value;
                }

                let updateRes = await fetch(API_URL, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [FILE_NAME]: {
                                content: JSON.stringify(config, null, 2)
                            }
                        }
                    })
                });

                if(updateRes.ok) {
                    msg.className = "text-center text-xs text-emerald-400 font-bold bg-emerald-950/40 py-2 rounded-lg border border-emerald-900/40";
                    msg.innerText = "تم حفظ وحقن البيانات بنجاح تلقائي! 🎉";
                    updateAllBadges(config);
                    setTimeout(() => { msg.classList.add('hidden'); }, 2500);
                } else {
                    alert("قيت هوب رفض التعديل. تحقق من صلاحيات التوكن.");
                    msg.classList.add('hidden');
                }
            } catch (error) {
                alert("حدث خطأ في الشبكة أثناء محاولة الحفظ.");
                msg.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
